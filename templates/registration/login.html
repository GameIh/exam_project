{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в систему</title>
  <link rel="icon" href="{% static 'core/favicon.svg' %}" type="image/svg+xml">
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --border: #dbe3ef;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .login-card {
      width: min(420px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--muted);
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
    }
    .field { margin-bottom: 16px; }
    .error {
      margin-bottom: 16px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #fdecec;
      color: var(--danger);
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--primary);
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Экзамены</h1>
    <p>Вход в личный кабинет</p>

    {% if form.errors %}
      <div class="error">Неверный email или пароль.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="{{ form.username.id_for_label }}">Email</label>
        {{ form.username }}
      </div>
      <div class="field">
        <label for="{{ form.password.id_for_label }}">Пароль</label>
        {{ form.password }}
      </div>
      <button type="submit">Войти</button>
    </form>
  </main>
</body>
</html>
